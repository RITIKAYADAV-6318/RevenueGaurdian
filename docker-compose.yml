# ==============================================================================
# Revenue Guardian - Multi-Container Orchestration
# ==============================================================================
version: "3.8"

services:
  # 1. FastAPI Backend & MCP Server
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: revenue-guardian-backend:latest
    container_name: rg_backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
      - DATABASE_URL=sqlite:///crm.db
    restart: always

  # 2. Executive Streamlit Dashboard
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: revenue-guardian-dashboard:latest
    container_name: rg_dashboard
    command: streamlit run app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
    depends_on:
      - backend
    restart: always
